steps:
  # Step 1: Run tests (will FAIL with intentional failing tests)
  - name: 'maven:3.9-eclipse-temurin-17'
    entrypoint: mvn
    args: ['test']

  # Step 2: Build jar
  - name: 'maven:3.9-eclipse-temurin-17'
    entrypoint: mvn
    args: ['package', '-DskipTests']

  # Step 3: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/sit707-java-app:$COMMIT_SHA', '.']

  # Step 4: Push image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/sit707-java-app:$COMMIT_SHA']

  # Step 5: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'sit707-java-app'
      - '--image=gcr.io/$PROJECT_ID/sit707-java-app:$COMMIT_SHA'
      - '--region=australia-southeast1'
      - '--platform=managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/sit707-java-app:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
